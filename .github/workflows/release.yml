name: Release

# Publishes to npm with provenance when a v* tag is pushed, e.g.:
#   npm version 1.0.0 && git push --follow-tags
# Requires an NPM_TOKEN secret (Automation token) in the repo settings.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - run: npm ci

      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

      # prepublishOnly re-runs lint/typecheck/build; --provenance signs the
      # release via GitHub OIDC (verified "Built on GitHub Actions" badge).
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
